<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {

  .wrap {

    position: relative;
    backdrop-filter: blur(10px);
  }

  .logo {
    width: 64px;
    height: 64px;
    margin: 0 auto 18px;
    border-radius: 18px;
    background: linear-gradient(145deg, #0d1f18, #0b0f14);

    display: grid;
    place-items: center;
    box-shadow: 0 0 30px rgba(16,185,129,0.15), inset 0 0 20px rgba(16,185,129,0.05);
    position: relative;
  }
  .logo::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: 18px;
    padding: 1px;
    background: linear-gradient(180deg, rgba(16,185,129,0.5), transparent);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;

  .logo svg { width: 32px; height: 32px; color: #10b981; }

  h1 {

    letter-spacing: 0.7em;
    text-align: center;
    color: #fff;
    outline: none;
    transition: all .2s ease;
    padding-left: calc(16px + 0.35em);
    font-variant-numeric: tabular-nums;

  }
  #pin::placeholder { color: #374151; letter-spacing: 0.7em; }
  #pin:focus {
    border-color: #10b981;

  .dots {

  .dot {

  .dot.active {
    background: #10b981;
    box-shadow: 0 0 10px rgba(16,185,129,0.6);

  }

  .error {

  .btn {
    width: 100%;
    background: #10b981;
    color: #03130c;
    border: none;
    border-radius: 14px;

    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
    box-shadow: 0 6px 20px rgba(16,185,129,0.25), inset 0 1px 0 rgba(255,255,255,0.15);

    overflow: hidden;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(16,185,129,0.32), inset 0 1px 0 rgba(255,255,255,0.15); }
  .btn:active { transform: translateY(0); box-shadow: 0 4px 14px rgba(16,185,129,0.2); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .links {
    margin-top: 20px;
    display: flex;
    justify-content: center;
  }
  .links a {
    color: #6b7280;

  }
  .shake { animation: shake 0.45s cubic-bezier(.36,.07,.19,.97); }

  /* Success */
  .success {
    transform: scale(0.96);
    opacity: 0;
  }

  /* Mobile tweaks */
  @media (max-width: 390px) {
    .card { padding: 36px 22px 28px; border-radius: 24px; }
    #pin { font-size: 26px; padding: 16px 12px; padding-left: calc(12px + 0.35em); }

<body class="ready">
<div class="wrap">
  <main class="card" id="card">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="11" width="14" height="9" rx="2"></rect>
        <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
      </svg>
    </div>
    <h1>SHIKHOR OS v8</h1>
    <p class="subtitle" id="subtitle">ตั้งค่า PIN 4 หลักเพื่อใช้งานครั้งแรก</p>

    <div class="pin-wrap">
      <input id="pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="PIN 4 หลัก" placeholder="••••">
    </div>
    <div class="dots" aria-hidden="true">
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
    </div>

    <p class="error" id="error"></p>

    <button id="unlock" class="btn" type="button">ตั้งค่า PIN</button>

    <div class="links">
      <a href="#" id="forgot" style="display: none;">ลืม PIN?</a>
    </div>
  </main>

  <footer>Created by Maew Maew Ooh</footer>
</div>

<script>
(function(){
  const pinInput = document.getElementById('pin');
  const btn = document.getElementById('unlock');
  const errorEl = document.getElementById('error');
  const subtitle = document.getElementById('subtitle');
  const card = document.getElementById('card');
  const forgot = document.getElementById('forgot');
  const dots = [document.getElementById('d1'), document.getElementById('d2'), document.getElementById('d3'), document.getElementById('d4')];

  // Check if already unlocked within 30 minutes
  try {
    const unlocked = localStorage.getItem('shikhor_unlocked');
    if (unlocked && (Date.now() - parseInt(unlocked, 10)) < 30 * 60 * 1000) {
      window.location.replace('app.html');
      return;
    }
  } catch(e){}

  document.body.classList.add('ready');

  let isSetup = false;
  try {
    isSetup = !localStorage.getItem('shikhor_pin');
  } catch(e){ isSetup = true; }

  let setupStep = 1;
  let tempPin = '';

  if (isSetup) {
    subtitle.textContent = 'ตั้งค่า PIN 4 หลักเพื่อใช้งานครั้งแรก';
    btn.textContent = 'ตั้งค่า PIN';
    forgot.style.display = 'none';
  }

  function updateDots(len) {
    dots.forEach((d,i) => d.classList.toggle('active', i < len));
  }

  function showError(msg) {
    errorEl.textContent = msg || '';
    if (msg) errorEl.classList.add('show'); else errorEl.classList.remove('show');
  }

  function shake() {
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
  }

  function success() {
    try { localStorage.setItem('shikhor_unlocked', Date.now().toString()); } catch(e){}
    card.style.transition = 'all .35s ease';
    card.classList.add('success');
    btn.disabled = true;
    pinInput.disabled = true;
    setTimeout(() => { window.location.replace('app.html'); }, 280);
  }

  function handleSubmit() {
    const pin = pinInput.value.replace(/\D/g,'').slice(0,4);
    pinInput.value = pin;

    if (pin.length < 4) {
      showError('กรุณาใส่ PIN ให้ครบ 4 หลัก');
      shake();
      return;
    }
    showError('');

    if (isSetup) {
      if (setupStep === 1) {
        tempPin = pin;
        pinInput.value = '';
        updateDots(0);
        setupStep = 2;
        subtitle.textContent = 'ยืนยัน PIN อีกครั้ง';
        btn.textContent = 'ยืนยัน';
        pinInput.focus();
      } else {
        if (pin === tempPin) {
          try { localStorage.setItem('shikhor_pin', pin); } catch(e){}
          success();
        } else {
          showError('PIN ไม่ตรงกัน ลองใหม่อีกครั้ง');
          shake();
          tempPin = '';
          setupStep = 1;
          pinInput.value = '';
          updateDots(0);
          subtitle.textContent = 'ตั้งค่า PIN 4 หลักเพื่อใช้งานครั้งแรก';
          btn.textContent = 'ตั้งค่า PIN';
        }
      }
    } else {
      let stored = null;
      try { stored = localStorage.getItem('shikhor_pin'); } catch(e){}
      if (pin === stored) {
        success();
      } else {
        showError('PIN ไม่ถูกต้อง');
        shake();
        pinInput.value = '';
        updateDots(0);
        pinInput.focus();
      }
    }
  }

  pinInput.addEventListener('input', () => {
    let v = pinInput.value.replace(/\D/g,'').slice(0,4);
    pinInput.value = v;
    updateDots(v.length);
    showError('');
    if (v.length === 4) {
      setTimeout(handleSubmit, 80);
    }
  });

  pinInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      handleSubmit();
    }
  });

  btn.addEventListener('click', handleSubmit);

  forgot.addEventListener('click', (e) => {
    e.preventDefault();
    const ok = confirm('ลืม PIN?\nการรีเซ็ตจะลบ PIN เดิมและต้องตั้งค่าใหม่\nยืนยันหรือไม่?');
    if (ok) {
      try {
        localStorage.removeItem('shikhor_pin');
        localStorage.removeItem('shikhor_unlocked');
      } catch(e){}
      location.reload();
    }
  });

  // Prevent paste non-numeric
  pinInput.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text') || '';
    pinInput.value = text.replace(/\D/g,'').slice(0,4);
    updateDots(pinInput.value.length);
  });

  setTimeout(() => pinInput.focus(), 300);
})();
</script>
